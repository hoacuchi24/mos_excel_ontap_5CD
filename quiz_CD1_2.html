    explain: '<b>Conditional Formatting → Highlight Cells Rules → Less Than</b>. Gõ giá trị <b>5</b> → chọn format <b>Light Red Fill with Dark Red Text</b> → OK. Các ô < 5 sẽ được tô nền đỏ nhạt.'
  },
  { topic: 2, n: 12, mos: "2.4.3",
    q: 'Để xóa TẤT CẢ quy luật định dạng có điều kiện từ toàn bộ trang tính, bạn dùng lệnh nào?',
    opts: [
      'Home → Conditional Formatting → Manage Rules → Delete All',
      'Home → Conditional Formatting → Clear Rules → Clear Rules from Entire Sheet',
      'Home → Clear → Clear All',
      'Chọn toàn bộ sheet → Delete → Clear Formatting'
    ],
    ans: 1,
    explain: '<b>Conditional Formatting → Clear Rules → Clear Rules from Entire Sheet</b>. Lệnh này xóa tất cả CF rules trên sheet hiện tại mà không ảnh hưởng dữ liệu hay định dạng ô thông thường.'
  },
];

// ── Render ──
const container = document.getElementById('quiz-container');
let correct = 0, wrong = 0, remain = quizData.length;

function updateScore() {
  document.getElementById('score-correct').textContent = `✅ ${correct}`;
  document.getElementById('score-wrong').textContent = `❌ ${wrong}`;
  document.getElementById('score-remain').textContent = `📝 ${remain}`;
}

let currentTopic = 0;
const topicColors = { 1: '#1F4E79', 2: '#534AB7' };
const topicNames = { 1: 'Chủ đề 1 — Manage Worksheets & Workbooks', 2: 'Chủ đề 2 — Manage Data Cells & Ranges' };

quizData.forEach((q, idx) => {
  if (q.topic !== currentTopic) {
    currentTopic = q.topic;
    const hdr = document.createElement('div');
    hdr.className = 'topic-header';
    hdr.style.background = topicColors[q.topic];
    hdr.innerHTML = `${topicNames[q.topic]} <span class="badge">${q.topic === 1 ? 12 : 12} câu</span>`;
    container.appendChild(hdr);
  }

  const card = document.createElement('div');
  card.className = 'q-card';
  card.id = `q-${idx}`;

  const optionsHTML = q.opts.map((o, oi) => {
    const letter = 'ABCD'[oi];
    return `<div class="opt" data-idx="${idx}" data-oi="${oi}" onclick="choose(${idx},${oi})">
      <span class="letter">${letter}</span>
      <span class="text">${o}</span>
    </div>`;
  }).join('');

  card.innerHTML = `
    <div class="q-header">
      <div class="q-num" style="background:${topicColors[q.topic]}">C${q.n}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-mos">${q.mos}</div>
    </div>
    <div class="options">${optionsHTML}</div>
    <div class="explain-area" id="exp-area-${idx}">
      <button class="explain-btn" onclick="showExplain(${idx})">💡 Xem giải thích đáp án</button>
      <div class="explain-content" id="exp-${idx}">${q.explain}</div>
    </div>
  `;
  container.appendChild(card);
});

function choose(qIdx, optIdx) {
  const card = document.getElementById(`q-${qIdx}`);
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;

  const q = quizData[qIdx];
  const opts = card.querySelectorAll('.opt');

  opts.forEach(o => { o.classList.add('disabled'); });
  opts[q.ans].classList.add('correct');

  if (optIdx === q.ans) {
    card.classList.add('answered-correct');
    correct++;
  } else {
    opts[optIdx].classList.add('wrong');
    card.classList.add('answered-wrong');
    wrong++;
  }
  remain--;
  updateScore();

  document.getElementById(`exp-area-${qIdx}`).style.display = 'block';
}

function showExplain(qIdx) {
  const el = document.getElementById(`exp-${qIdx}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}
</script>
</body>
</html>
